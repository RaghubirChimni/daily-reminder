name: Daily Reminder

on:
  schedule:
    # Runs at 12 PM UTC every day (4 or 5 AM PST)
    - cron: '0 12 * * *'
  
  # Allows manual trigger of the workflow for testing
  workflow_dispatch:

jobs:
  send-reminder:
    name: Send daily sms reminder
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Send daily reminder
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          RECIPIENT_PHONE_NUMBERS: ${{ secrets.RECIPIENT_PHONE_NUMBERS }}
        run: python daily-reminder.py